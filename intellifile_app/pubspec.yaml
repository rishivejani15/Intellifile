name: intellifile_app
description: "IntelliFile - Cross-device file sync over WiFi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── Networking ──────────────────────────────────────────────
  web_socket_channel: ^3.0.3     # WebSocket client
  nsd: ^4.1.0                    # mDNS/Zeroconf discovery
  flutter_webrtc: ^0.14.2        # WebRTC DataChannel transport

  # ── Storage & paths ────────────────────────────────────────
  path_provider: ^2.1.5          # App documents directory
  path: ^1.9.1                   # Cross-platform path manipulation
  sqflite: ^2.4.2                # SQLite for vector clocks
  permission_handler: ^12.0.1
  external_path: ^2.2.0

  # ── Crypto ─────────────────────────────────────────────────
  crypto: ^3.0.6                 # MD5 checksums for block deltas

  # ── File actions ───────────────────────────────────────────
  open_filex: ^4.7.0             # Open files with system app
  share_plus: ^10.1.4            # Share files via OS share sheet
  shared_preferences: ^2.5.5
  mobile_scanner: ^5.2.3         # QR code scanning

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
